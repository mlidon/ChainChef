<!-- frontend/recetas.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente de Recetas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body >
    <!-- <nav class="navbar navbar-dark bg-dark px-5">
        <img src="img/logo_dark.png" alt="logo chainchef" width="100">
        <button class="btn btn-outline-light" onclick="logout()">Cerrar sesión</button>
    </nav> -->

    <div class="app-container">
        <!-- Panel Izquierdo: Entrada -->
        <div class="left-panel">
            <div class="container-fluid d-flex flex-column justify-content-top align-items-center w-100 mt-0">
                <img src="img/logo_dark.png" alt="logo chainchef"   width="250" height="250">
            
            <p class="subtitle">Asistente de recetas con IA • 100% local</p>
            </div>
            <div class="mb-3">
                <label for="mensaje" class="form-label fw-semibold">¿Qué te apetece cocinar?</label>
                <textarea 
                    id="mensaje" 
                    class="form-control prompt-input" 
                    style="color: white!important;"
                    rows="4" 
                    placeholder="Ej: Quiero una receta con pollo, sin frutos secos, en 30 minutos"
                ></textarea>
            </div>

            <button id="btnGenerar" class="btn generate-btn w-100" onclick="generarReceta()">
                <i class="bi bi-magic"></i> Generar Receta
            </button>

            <div class="example-chips">
                <span class="chip" onclick="setPrompt('Tortilla de patatas con cebolla en 20 min')">🥚 Tortilla</span>
                <span class="chip" onclick="setPrompt('Arroz con verduras sin gluten 25 min')">🥦 Arroz veggies</span>
                <span class="chip" onclick="setPrompt('Pollo al horno con especias 40 min')">🍗 Pollo especiado</span>
                <span class="chip" onclick="setPrompt('Bizcocho de yogur esponjoso 45 min')">🍰 Bizcocho</span>
            </div>

            <hr>
            <div class="d-flex justify-content-center">
                <button class="btn btn-outline-light w-50" onclick="logout()">Cerrar sesión</button>
            </div>

            

        </div>

        <!-- Panel Derecho: Resultado -->
        <div class="right-panel" id="rightPanel">
            <div class="placeholder-message" id="placeholder">
                <i class="bi bi-robot" style="font-size: 4rem; color: #ddd;"></i>
                <h4 class="mt-3 text-muted">Tu receta aparecerá aquí</h4>
                <p class="text-muted">Describe lo que quieres cocinar y la IA hará el resto</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
